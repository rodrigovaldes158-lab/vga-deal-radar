<svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg" width="54" height="54">
  <!-- Reverse two-node mark for DARK backgrounds (hero, approach, contact, footer).
       Same geometry as vga_mark.svg but the lower node is light instead of navy,
       so both nodes stay visible on navy. No background, no frame — transparent. -->

  <!-- Connector between the two nodes (teal accent) -->
  <line x1="20" y1="42" x2="41" y2="14" stroke="#14B8A6" stroke-width="2.5"/>

  <!-- Lower node: light (mist) -->
  <circle cx="20" cy="42" r="9" fill="#FBFBF8"/>

  <!-- Top node: teal ("decision point") -->
  <circle cx="41" cy="14" r="11" fill="#14B8A6"/>
</svg>
